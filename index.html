<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bangalore Property Visit Scorecard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Bangalore Property Visit Scorecard</h1>
      <p>
        Track your on-site review for each shortlisted property and rank them
        by live visit score.
      </p>
      <p>Mobile quick-tap rating: tap 1-5 on each criterion while at site.</p>
      <div class="actions">
        <button id="resetAll" type="button">Reset All Ratings</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <h2>Current Ranking (Based on Site Ratings)</h2>
        <div class="table-wrap">
          <table id="rankingTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Project</th>
                <th>Builder</th>
                <th>Area</th>
                <th>All-in Price (Cr)</th>
                <th>Visit Score</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="propertyCards" class="cards"></section>
    </main>

    <template id="propertyCardTemplate">
      <article class="panel property-card">
        <div class="card-header">
          <h3 class="project-name"></h3>
          <p class="project-meta"></p>
        </div>
        <p class="project-details"></p>

        <div class="card-tabs" role="tablist" aria-label="Property sections">
          <button type="button" class="card-tab active" data-tab-target="rate">
            Rate
          </button>
          <button type="button" class="card-tab" data-tab-target="questions">
            Questions
          </button>
        </div>

        <section class="tab-panel active" data-tab-panel="rate">
          <div class="score-grid"></div>
          <label class="note-label" for="">
            Visit Notes
            <textarea rows="3" placeholder="Quick notes from your site visit..."></textarea>
          </label>
        </section>

        <section class="tab-panel" data-tab-panel="questions">
          <h4>Questions To Ask At Site</h4>
          <ul class="question-list"></ul>
        </section>

        <p class="score-line">
          Property Visit Score: <strong class="score-value">Not rated</strong>
        </p>
      </article>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
